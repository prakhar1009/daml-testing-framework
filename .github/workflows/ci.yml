name: Daml Testing Framework CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  daml-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Daml SDK
        run: curl -sSL https://get.daml.com/ | sh -s 2.9.0
      - run: ~/.daml/bin/daml build
      - run: ~/.daml/bin/daml test --all

  framework-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m pytest dtf/ -v
